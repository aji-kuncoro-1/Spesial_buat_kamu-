<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Spesial Buat Kamu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=1480&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Ubuntu', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 182, 193, 0.85); 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 100; text-align: center; padding: 30px; 
            box-sizing: border-box;
        }

        h2 { 
            color: white; margin-top: 20px; font-size: 1.3rem; 
            max-width: 100%; line-height: 1.6; word-wrap: break-word; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }

        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: none; max-width: 380px; width: 85%; 
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            position: relative; /* Penting agar tombol bisa diposisikan absolut terhadap kotak ini */
            min-height: 400px;
        }

        h1 { color: #d1618a; font-size: 1.4rem; min-height: 80px; margin: 20px 0; line-height: 1.5; }
        .stiker { width: 130px; height: 130px; object-fit: contain; }
        
        #tombolPilihan { 
            display: none; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px;
            min-height: 50px; /* Memberi ruang untuk tombol bergerak */
        }

        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-mulai { background: white; color: #ff6b81; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-ya { background: #ff6b81; color: white; }
        
        .btn-tidak { 
            background: #bdc3c7; 
            color: white; 
            position: relative; /* Default awal */
            transition: all 0.15s ease-out;
        }
        
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <audio id="lagu" loop playsinline>
        <source src="Stephen Sanchez - Until I Found You (Official Video) - StephenSanchezVEVO.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <img class="stiker bounce" src="Bayi Panda.gif">
        <h2>Halo Fiaa Cantik,<br>Ada pesan buat kamu...</h2>
        <button class="btn btn-mulai" id="tombolMulai">Buka Pesan ❤️</button>
    </div>

    <div class="container" id="konten">
        <img id="gambar" class="stiker" src="Gambar Pose Tubuh.gif">
        <h1 id="teksUcapan"></h1>
        <div id="tombolPilihan">
            <button class="btn btn-ya" onclick="terima()">MAU!</button>
            <button class="btn btn-tidak" id="btnNo" onmouseover="lari()" onclick="lari()">Gak</button>
        </div>
    </div>

    <script>
        const nomorWA = "6282289735137"; 
        const lagu = document.getElementById("lagu");
        const tombolMulai = document.getElementById("tombolMulai");
        const overlay = document.getElementById("overlay");
        const konten = document.getElementById("konten");
        const ucapanEl = document.getElementById("teksUcapan");
        const btnNo = document.getElementById("btnNo");

        const teks = [
            "Hai Alfia...", 
            "Aku mau jujur sesuatu...", 
            "Sebenarnya...", 
            "Aku sayang banget sama kamu 😊", 
            "Kamu mau gak jadi pacarku?"
        ];
        let index = 0;

        tombolMulai.addEventListener('click', function() {
            lagu.play().catch(e => console.log("Musik butuh klik manual"));
            overlay.style.display = "none";
            konten.style.display = "block";
            tampilkanTeks();
        });

        function tampilkanTeks() {
            if (index < teks.length) {
                ucapanEl.innerHTML = ""; 
                let charIndex = 0;
                let barisTeks = teks[index];
                let interval = setInterval(() => {
                    ucapanEl.innerHTML += barisTeks[charIndex];
                    charIndex++;
                    if (charIndex === barisTeks.length) {
                        clearInterval(interval);
                        setTimeout(() => {
                            if (index < teks.length - 1) { 
                                index++; 
                                tampilkanTeks(); 
                            } else { 
                                document.getElementById("tombolPilihan").style.display = "flex"; 
                            }
                        }, 1500);
                    }
                }, 80); 
            }
        }

        // LOGIKA BARU: Tombol 'Gak' hanya lari di dalam kotak putih
        function lari() {
            const container = document.getElementById("konten");
            const rect = container.getBoundingClientRect(); // Ambil ukuran kotak putih
            
            // Tentukan batas aman (supaya tidak menutupi teks/gambar)
            // Tombol akan bergerak di area bawah kotak
            const padding = 20;
            const maxW = rect.width - btnNo.offsetWidth - padding;
            const maxH = rect.height - btnNo.offsetHeight - padding;

            // Hitung posisi random relatif terhadap kotak putih
            const randomX = Math.floor(Math.random() * maxW);
            const randomY = Math.floor(Math.random() * maxH);

            btnNo.style.position = "absolute"; 
            btnNo.style.left = randomX + "px"; 
            btnNo.style.top = randomY + "px";
        }

        function terima() {
            const emojiHati = "\u2764\uFE0F"; 
            const pesanFinal = "Iya, aku mau jadi pacar kamu! " + emojiHati;

            Swal.fire({
                title: 'YEAYYY! ' + emojiHati,
                text: 'Kirim jawaban kamu ke WhatsApp ya!',
                icon: 'success',
                confirmButtonText: 'Kirim Sekarang 🚀',
                confirmButtonColor: '#ff6b81'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById("gambar").src = "https://media4.giphy.com/media/KztT2c4u8mYYUiMKdJ/giphy.gif";
                    ucapanEl.innerHTML = "I Love You! " + emojiHati;
                    document.getElementById("tombolPilihan").style.display = "none";
                    window.location.href = "https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesanFinal);
                }
            });
        }
    </script>
</body>
</html>
