<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Spesial Buat Kamu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Dasar tampilan agar konten selalu di tengah */
        body { background-color: #ffe4e1; font-family: 'Ubuntu', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Overlay diperbaiki agar teks TIDAK TERPOTONG di HP */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ffb6c1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
            text-align: center; padding: 30px; box-sizing: border-box; 
        }

        /* Teks h2 dibuat fleksibel (wrap) dan ukuran font pas untuk HP */
        h2 { 
            color: white; margin-top: 20px; font-size: 1.3rem; 
            max-width: 100%; line-height: 1.6; word-wrap: break-word; 
        }

        /* Container pesan utama */
        .container { 
            text-align: center; background: white; padding: 30px; 
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: none; max-width: 380px; width: 85%; box-sizing: border-box;
        }

        /* Judul ucapan di dalam container */
        h1 { color: #d1618a; font-size: 1.4rem; min-height: 60px; margin: 20px 0; line-height: 1.5; }
        
        /* Ukuran stiker/GIF agar tidak kebesaran */
        .stiker { width: 130px; height: 130px; object-fit: contain; }
        
        /* Tombol */
        .btn { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-mulai { background: white; color: #ff6b81; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-ya { background: #ff6b81; color: white; }
        .btn-tidak { background: #bdc3c7; color: white; position: relative; }
        
        /* Animasi goyang pada stiker */
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        /* Responsif tambahan untuk layar HP yang sangat kecil (seperti iPhone SE) */
        @media screen and (max-width: 380px) {
            h2 { font-size: 1.1rem; }
            h1 { font-size: 1.2rem; }
            .stiker { width: 110px; height: 110px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Musik Lokal: Pastikan file ini ada di GitHub satu folder dengan index.html -->
    <audio id="lagu" loop playsinline>
        <source src="Stephen Sanchez - Until I Found You (Official Video) - StephenSanchezVEVO.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <!-- GIF Lokal: Pastikan file ini ada di GitHub satu folder dengan index.html -->
        <img class="stiker bounce" src="Bayi Panda.gif">
        <h2>Halo Fiaa Cantik,<br>Ada pesan buat kamu...</h2>
        <button class="btn btn-mulai" id="tombolMulai">Buka Pesan ❤️</button>
    </div>

    <div class="container" id="konten">
        <!-- GIF Lokal: Pastikan file ini ada di GitHub satu folder dengan index.html -->
        <img id="gambar" class="stiker" src="Gambar Pose Tubuh.gif">
        <h1 id="teksUcapan"></h1>
        <div id="tombolPilihan" style="display: none; justify-content: center; gap: 15px;">
            <button class="btn btn-ya" onclick="terima()">MAU!</button>
            <button class="btn btn-tidak" id="btnNo" onmouseover="lari()" onclick="lari()">Gak</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const nomorWA = "6282289735137"; 
        
        const lagu = document.getElementById("lagu");
        const tombolMulai = document.getElementById("tombolMulai");
        const overlay = document.getElementById("overlay");
        const konten = document.getElementById("konten");
        const ucapanEl = document.getElementById("teksUcapan");
        const btnNo = document.getElementById("btnNo");

        const teks = [
            "Hai kamu...", 
            "Aku mau jujur sesuatu...", 
            "Sebenarnya...", 
            "Aku sayang banget sama kamu 😊", 
            "Kamu mau gak jadi pacarku?"
        ];
        let index = 0;

        // Fungsi saat tombol Mulai diklik
        tombolMulai.addEventListener('click', function() {
            lagu.play().catch(e => console.log("Musik butuh interaksi user"));
            overlay.style.display = "none";
            konten.style.display = "block";
            tampilkanTeks();
        });

        // Animasi teks mengetik
        function tampilkanTeks() {
            if (index < teks.length) {
                ucapanEl.innerHTML = ""; 
                let charIndex = 0;
                let barisTeks = teks[index];
                let interval = setInterval(() => {
                    ucapanEl.innerHTML += barisTeks[charIndex];
                    charIndex++;
                    if (charIndex === barisTeks.length) {
                        clearInterval(interval);
                        setTimeout(() => {
                            if (index < teks.length - 1) { 
                                index++; 
                                tampilkanTeks(); 
                            } else { 
                                document.getElementById("tombolPilihan").style.display = "flex"; 
                            }
                        }, 1500);
                    }
                }, 80); 
            }
        }

        // Fungsi tombol lari
        function lari() {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            btnNo.style.position = "fixed"; 
            btnNo.style.left = x + "px"; 
            btnNo.style.top = y + "px";
        }

        // Fungsi saat diterima (Kirim WA)
        function terima() {
            // Gunakan Unicode agar emoji TIDAK JADI TANDA TANYA
            const emojiHati = "\u2764\uFE0F"; 
            const emojiBintang = "\u2728";    
            const pesanFinal = "Iya, aku mau jadi pacar kamu! " + emojiHati + emojiBintang;

            Swal.fire({
                title: 'YEAYYY! ' + emojiHati,
                text: 'Kirim jawaban kamu ke WhatsApp aku ya!',
                icon: 'success',
                confirmButtonText: 'Kirim Sekarang 🚀',
                confirmButtonColor: '#ff6b81'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Jika kamu punya GIF penutup, ganti link di bawah ini
                    document.getElementById("gambar").src = "https://media4.giphy.com/media/KztT2c4u8mYYUiMKdJ/giphy.gif";
                    ucapanEl.innerHTML = "I Love You! " + emojiHati;
                    document.getElementById("tombolPilihan").style.display = "none";
                    
                    // Redirect ke WA
                    window.location.href = "https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesanFinal);
                }
            });
        }
    </script>
</body>
</html>
